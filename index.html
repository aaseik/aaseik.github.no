<!DOCTYPE html>
<html>
<head>
  <title>Football Auction</title>
</head>
<body>

<h1>Leaderboard</h1>

<table border="1" id="leaderboard">
  <tr>
    <th>Team</th>
    <th>Bid</th>
    <th>Owner</th>
  </tr>
</table>

<br>

<a href="PUT_YOUR_FORM_LINK_HERE">Place a bid</a>

<script>
async function loadData() {
  const res = await fetch("leaderboard.json");
  const data = await res.json();

  const table = document.getElementById("leaderboard");

  // clear existing rows except header
  table.innerHTML = `
    <tr>
      <th>Team</th>
      <th>Bid</th>
      <th>Owner</th>
    </tr>
  `;

  // sort highest bid first (you know JS 😉)
  data.sort((a, b) => b.bid - a.bid);

  data.forEach(row => {
    const tr = document.createElement("tr");

    tr.innerHTML = `
      <td>${row.team}</td>
      <td>${row.bid}</td>
      <td>${row.owner}</td>
    `;

    table.appendChild(tr);
  });
}

loadData();

// auto refresh every 10 sec (nice UX)
setInterval(loadData, 10000);
</script>

</body>
</html>
